[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-quota-exporter"
version = "0.1.0"
description = "Prometheus exporter for Anthropic Claude OAuth API usage limits"
readme = "README.md"

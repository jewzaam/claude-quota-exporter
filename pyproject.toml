claude-quota-exporter = "claude_quota_exporter.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["claude_quota_exporter*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.14"
warn_return_any = true
warn_unused_configs = true
